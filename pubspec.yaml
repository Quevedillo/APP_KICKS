name: kickspremium_mobile
description: "KicksPremium Mobile App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.0
  flutter_riverpod: ^3.2.0
  go_router: ^17.0.1
  google_fonts: ^8.0.2
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.2
  flutter_dotenv: ^6.0.0
  intl: ^0.20.2
  flutter_stripe: ^12.2.0
  http: ^1.2.0
  pdf: ^3.11.0
  printing: ^5.13.0
  shared_preferences: ^2.2.2
  fl_chart: ^1.1.1
  image_picker: ^1.1.2
  image: ^4.3.0
  path_provider: ^2.0.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  freezed: ^3.2.5
  json_serializable: ^6.9.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  assets:

    - assets/images/
    - assets/LOGO.png